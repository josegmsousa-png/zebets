<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZéBets</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #13161f;
    --surface2: #1a1e2a;
    --surface3: #20253a;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f2f8;
    --muted: #6b7280;
    --muted2: #9ca3af;
    --accent: #6c63ff;
    --accent2: #8b85ff;
    --green: #22d3a3;
    --green-bg: rgba(34,211,163,0.1);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.1);
    --amber: #fbbf24;
    --radius-sm: 10px;
    --radius: 16px;
    --radius-lg: 22px;
    --radius-xl: 28px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  /* HEADER */
  header {
    padding: 2rem 2.5rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(13,15,20,0.92);
    backdrop-filter: blur(16px);
    z-index: 100;
  }

  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 1.7rem;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #6c63ff, #22d3a3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span { font-style: italic; }

  .header-actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  /* TABS */
  .month-tabs {
    display: flex;
    gap: 8px;
    padding: 1.5rem 2.5rem 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .month-tabs::-webkit-scrollbar { display: none; }

  .tab-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted2);
    padding: 8px 20px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover { border-color: var(--border2); color: var(--text); }
  .tab-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* MAIN */
  main { padding: 1.5rem 2.5rem 4rem; }

  /* STAT CARDS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.2rem 1.4rem;
    transition: border-color 0.2s, transform 0.2s;
  }
  .stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }

  .stat-label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 1.9rem;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-sub {
    font-size: 12px;
    color: var(--muted);
  }

  .stat-card.accent { border-color: rgba(108,99,255,0.3); background: rgba(108,99,255,0.06); }
  .stat-card.green { border-color: rgba(34,211,163,0.3); background: var(--green-bg); }
  .stat-card.green .stat-value { color: var(--green); }
  .stat-card.red { border-color: rgba(248,113,113,0.3); background: var(--red-bg); }
  .stat-card.red .stat-value { color: var(--red); }

  /* CHARTS ROW */
  .charts-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 14px;
    margin-bottom: 1.5rem;
  }

  .chart-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.4rem;
  }

  .chart-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted2);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 1rem;
  }

  .chart-wrap { position: relative; height: 200px; }

  /* DONUT LEGEND */
  .donut-legend {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 1rem;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* BETS TABLE */
  .bets-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  .bets-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 1.4rem;
    border-bottom: 1px solid var(--border);
  }

  .bets-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted2);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  .add-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 7px 16px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s, transform 0.15s;
  }
  .add-btn:hover { background: var(--accent2); transform: scale(1.03); }

  .plus-icon {
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.2);
    border-radius: 50%;
    font-size: 14px;
    line-height: 1;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }

  thead th {
    background: var(--surface2);
    color: var(--muted);
    font-weight: 500;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 10px 14px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }

  td {
    padding: 11px 14px;
    vertical-align: middle;
  }

  .outcome-badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: 600;
  }
  .outcome-W { background: var(--green-bg); color: var(--green); }
  .outcome-L { background: var(--red-bg); color: var(--red); }
  .outcome-pending { background: rgba(251,191,36,0.12); color: var(--amber); }

  .delete-row-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 2px 6px;
    border-radius: 6px;
    transition: color 0.15s, background 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .delete-row-btn:hover { color: var(--red); background: var(--red-bg); }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-xl);
    padding: 2rem;
    width: 90%;
    max-width: 480px;
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    margin-bottom: 1.5rem;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted2);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }

  input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    padding: 9px 12px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 1.5rem;
  }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted2);
    padding: 9px 20px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-cancel:hover { color: var(--text); border-color: var(--border2); }

  .btn-save {
    background: var(--accent);
    border: none;
    color: #fff;
    padding: 9px 24px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-save:hover { background: var(--accent2); }

  .empty-state {
    padding: 3rem;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }

  .sport-icon {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 13px;
    flex-shrink: 0;
    margin-right: 6px;
    vertical-align: middle;
  }
  .sport-icon.basketball { background: rgba(251,146,60,0.15); }
  .sport-icon.nfl { background: rgba(139,92,246,0.15); }
  .sport-icon.other { background: rgba(156,163,175,0.12); }

  .game-cell { display: flex; align-items: center; }

  .add-month-btn {
    background: none;
    border: 1px dashed var(--border2);
    color: var(--muted);
    padding: 8px 18px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .add-month-btn:hover { border-color: var(--accent); color: var(--accent); }

  @media (max-width: 700px) {
    header, main, .month-tabs { padding-left: 1.2rem; padding-right: 1.2rem; }
    .charts-row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    table { font-size: 12px; }
    td, thead th { padding: 9px 10px; }
    .form-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Zé<span>Bets</span></div>
  <div class="header-actions">
    <span id="header-month" style="font-size:13px;color:var(--muted);">April 2026</span>
  </div>
</header>

<div class="month-tabs" id="monthTabs"></div>

<main>
  <div class="stats-grid" id="statsGrid"></div>
  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">Daily Balance (€)</div>
      <div class="chart-wrap"><canvas id="balanceChart"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Win / Loss Ratio</div>
      <div style="position:relative;height:160px;">
        <canvas id="wrChart"></canvas>
        <div id="wrCenterLabel" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;">
          <div id="wrPct" style="font-size:1.5rem;font-weight:600;line-height:1;color:var(--green);">—</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px;letter-spacing:0.05em;">WIN RATE</div>
        </div>
      </div>
      <div class="donut-legend" id="donutLegend"></div>
    </div>
  </div>

  <div class="bets-card">
    <div class="bets-header">
      <div class="bets-title">Bet History</div>
      <button class="add-btn" onclick="openModal()">
        <span class="plus-icon">+</span> Add Bet
      </button>
    </div>
    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Bet</th>
            <th>Game</th>
            <th>Odd</th>
            <th>Stake (€)</th>
            <th>Outcome</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="betsBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState" style="display:none;">No bets for this month yet.</div>
    </div>
  </div>
</main>

<!-- ADD BET MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Add New Bet</div>
    <div class="form-grid" style="grid-template-columns:1fr 1fr 1fr">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="f-date">
      </div>
      <div class="form-group">
        <label>Sport</label>
        <select id="f-sport">
          <option value="basketball">🏀 Basketball</option>
          <option value="nfl">🏈 NFL</option>
          <option value="other">⚽ Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Outcome</label>
        <select id="f-outcome">
          <option value="">Pending</option>
          <option value="W">Win (W)</option>
          <option value="L">Loss (L)</option>
        </select>
      </div>
      <div class="form-group full">
        <label>Bet / Selection</label>
        <input type="text" id="f-bet" placeholder="e.g. Lakers -5.5">
      </div>
      <div class="form-group full">
        <label>Game</label>
        <input type="text" id="f-game" placeholder="e.g. Lakers - Celtics">
      </div>
      <div class="form-group">
        <label>Odd</label>
        <input type="number" id="f-odd" step="0.01" placeholder="1.75">
      </div>
      <div class="form-group">
        <label>Stake (€)</label>
        <input type="number" id="f-stake" step="0.5" placeholder="10.00">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveBet()">Save Bet</button>
    </div>
  </div>
</div>

  {date:"4/22/2026",bet:"Orlando Magic +9.5",game:"Detroit Pistons - Orlando Magic",odd:1.75,stake:5.00,outcome:""},
];

const SEED_BALANCE = { "4/2/2026": 35.0 };

function computeDailyBalances(monthKey) {
  const [y, m] = monthKey.split('-').map(Number);
  const monthBets = allBets.filter(b => {
    if (b._placeholder) return false;
    const d = new Date(b.date);
    return d.getFullYear() === y && d.getMonth() + 1 === m;
  });

  const byDay = {};
  for (const b of monthBets) {
    if (!byDay[b.date]) byDay[b.date] = [];
    byDay[b.date].push(b);
  }

  const days = Object.keys(byDay).sort((a, b) => new Date(a) - new Date(b));
  if (!days.length) return [];

  const seedKey = Object.keys(SEED_BALANCE).find(k => {
    const d = new Date(k);
    return d.getFullYear() === y && d.getMonth() + 1 === m;
  });
  let runningBalance = seedKey ? SEED_BALANCE[seedKey] : null;

  const result = [];
  if (runningBalance !== null) {
    result.push([seedKey, runningBalance]);
  } else {
    const prevMonthDate = new Date(y, m - 2, 1);
    const prevKey = `${prevMonthDate.getFullYear()}-${String(prevMonthDate.getMonth()+1).padStart(2,'0')}`;
    const prevEntries = computeDailyBalances(prevKey);
    runningBalance = prevEntries.length ? prevEntries[prevEntries.length - 1][1] : 0;
  }

  for (const day of days) {
    const dayBets = byDay[day];
    let dayPnl = 0;
    for (const b of dayBets) {
      if (b.outcome === 'W') dayPnl += b.stake * b.odd - b.stake;
      else if (b.outcome === 'L') dayPnl -= b.stake;
    }
    runningBalance = parseFloat((runningBalance + dayPnl).toFixed(2));
    result.push([day, runningBalance]);
  }
  return result;
}

let allBets = loadBets();
let activeMonth = null;
let balChart = null, donutChart = null;

function betKey(b) { return `${b.date}|${b.bet}|${b.game}`; }

function loadBets() {
  const stored = JSON.parse(localStorage.getItem('zebets_bets') || 'null');
  const currentSig = JSON.stringify(INITIAL_DATA);
  const storedSig = localStorage.getItem('zebets_initial_sig');

  if (!stored) {
    localStorage.setItem('zebets_initial_sig', currentSig);
    return INITIAL_DATA.slice();
  }
  if (storedSig === currentSig) return stored;

  const initialKeys = new Set(INITIAL_DATA.map(betKey));
  const userAdded = stored.filter(b => !b._placeholder && !initialKeys.has(betKey(b)));
  const placeholders = stored.filter(b => b._placeholder);
  const merged = [...INITIAL_DATA, ...userAdded, ...placeholders];
  localStorage.setItem('zebets_bets', JSON.stringify(merged));
  localStorage.setItem('zebets_initial_sig', currentSig);
  return merged;
}

function saveData() {
  localStorage.setItem('zebets_bets', JSON.stringify(allBets));
  localStorage.setItem('zebets_initial_sig', JSON.stringify(INITIAL_DATA));
}

function getMonths() {
  const months = new Set(allBets.map(b => {
    const d = new Date(b.date);
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  }));
  return [...months].sort();
}

function monthLabel(key) {
  const [y,m] = key.split('-');
  return new Date(y, m-1, 1).toLocaleDateString('en-US', {month:'long', year:'numeric'});
}

function betsForMonth(key) {
  return allBets.filter(b => {
    if (b._placeholder) return false;
    const d = new Date(b.date);
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    return k === key;
  });
}

function renderTabs() {
  const tabs = document.getElementById('monthTabs');
  const months = getMonths();
  if (!activeMonth || !months.includes(activeMonth)) activeMonth = months[months.length-1];

  const lastMonth = months[months.length-1];
  const [ly, lm] = lastMonth.split('-').map(Number);
  const nextDate = new Date(ly, lm, 1);
  const nextKey = `${nextDate.getFullYear()}-${String(nextDate.getMonth()+1).padStart(2,'0')}`;
  const nextLabel = nextDate.toLocaleDateString('en-US', {month:'long', year:'numeric'});

  tabs.innerHTML = months.map(m =>
    `<button class="tab-btn${m===activeMonth?' active':''}" onclick="selectMonth('${m}')">${monthLabel(m)}</button>`
  ).join('') + `<button class="add-month-btn" onclick="addMonth('${nextKey}', '${nextLabel}')">+ ${nextLabel}</button>`;

  document.getElementById('header-month').textContent = monthLabel(activeMonth);
}

function addMonth(key, label) {
  if (!getMonths().includes(key)) {
    const [y, m] = key.split('-').map(Number);
    allBets.push({
      date: `${m}/1/${y}`, bet: '__placeholder__', game: '', odd: 0, stake: 0, outcome: '', sport: 'basketball', _placeholder: true
    });
    saveData();
  }
  activeMonth = key;
  render();
}

function selectMonth(m) {
  activeMonth = m;
  render();
}

function render() {
  renderTabs();
  const bets = betsForMonth(activeMonth);
  const settled = bets.filter(b => b.outcome === 'W' || b.outcome === 'L');
  const wins = settled.filter(b => b.outcome === 'W').length;
  const losses = settled.filter(b => b.outcome === 'L').length;
  const wr = settled.length ? ((wins/settled.length)*100).toFixed(1) : '—';
  const totalStake = bets.reduce((s,b)=>s+b.stake,0);
  const settledStake = settled.reduce((s,b)=>s+b.stake,0);
  const settledReturn = settled.filter(b=>b.outcome==='W').reduce((s,b)=>s+(b.stake*b.odd),0);
  const pnl = settledReturn - settledStake;

  const grid = document.getElementById('statsGrid');
  const balEntries = computeDailyBalances(activeMonth);
  const currentBalance = balEntries.length ? balEntries[balEntries.length-1][1] : null;
  const startingBalance = balEntries.length ? balEntries[0][1] : null;
  const balDisplay = currentBalance !== null ? `€${currentBalance.toFixed(2)}` : '—';
  const balColor = currentBalance !== null ? (currentBalance >= 0 ? 'var(--green)' : 'var(--red)') : 'var(--muted2)';
  const startDisplay = startingBalance !== null ? `Started at €${startingBalance.toFixed(2)}` : 'no data yet';

  const roi = settledStake > 0 ? ((pnl / settledStake) * 100) : null;
  const roiDisplay = roi !== null ? `${roi >= 0 ? '+' : ''}${roi.toFixed(1)}%` : '—';
  const roiColor = roi === null ? 'var(--muted2)' : roi >= 0 ? 'var(--green)' : 'var(--red)';

  grid.innerHTML = `
    <div class="stat-card accent">
      <div class="stat-label">Total Bets</div>
      <div class="stat-value" style="color:var(--accent2)">${bets.length}</div>
      <div class="stat-sub">${settled.length} settled</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Current Balance</div>
      <div class="stat-value" style="color:${balColor}">${balDisplay}</div>
      <div class="stat-sub">${startDisplay}</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Win Rate</div>
      <div class="stat-value">${wr}${wr!=='—'?'%':''}</div>
      <div class="stat-sub">${wins}W / ${losses}L</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">ROI</div>
      <div class="stat-value" style="color:${roiColor}">${roiDisplay}</div>
      <div class="stat-sub">return on stake</div>
    </div>
    <div class="stat-card ${pnl>=0?'green':'red'}">
      <div class="stat-label">P&L</div>
      <div class="stat-value">${pnl>=0?'+':''}€${pnl.toFixed(2)}</div>
      <div class="stat-sub">Settled stake €${settledStake.toFixed(2)}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Avg Odd</div>
      <div class="stat-value" style="color:var(--amber)">${bets.length?( bets.reduce((s,b)=>s+b.odd,0)/bets.length).toFixed(2):'—'}</div>
      <div class="stat-sub">per bet</div>
    </div>
  `;

  renderBalanceChart(bets);
  renderDonutChart(wins, losses, bets.length - settled.length);
  renderTable(bets);
}

function renderBalanceChart(bets) {
  const balEntries = computeDailyBalances(activeMonth);
  const labels = balEntries.map(([d]) => d.replace(`/${activeMonth.split('-')[0]}`, ''));
  const data = balEntries.map(([, v]) => v);

  if (balChart) balChart.destroy();
  const ctx = document.getElementById('balanceChart').getContext('2d');
  const grad = ctx.createLinearGradient(0,0,0,200);
  grad.addColorStop(0,'rgba(108,99,255,0.35)');
  grad.addColorStop(1,'rgba(108,99,255,0)');

  balChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data,
        borderColor: '#6c63ff',
        backgroundColor: grad,
        borderWidth: 2.5,
        pointBackgroundColor: '#6c63ff',
        pointRadius: 4,
        pointHoverRadius: 6,
        fill: true,
        tension: 0.4
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: {display:false}, tooltip: {
        backgroundColor:'#1a1e2a', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
        titleColor:'#9ca3af', bodyColor:'#f0f2f8',
        callbacks: { label: ctx => `€${ctx.parsed.y.toFixed(2)}` }
      }},
      scales: {
        x: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#6b7280',font:{size:11}} },
        y: { grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#6b7280',font:{size:11}, callback: v=>`€${v}`} }
      }
    }
  });
}

function renderDonutChart(wins, losses, pending) {
  const settled = wins + losses;
  const wrPct = settled ? ((wins / settled) * 100).toFixed(1) : null;
  const pctEl = document.getElementById('wrPct');
  if (wrPct !== null) {
    pctEl.textContent = wrPct + '%';
    pctEl.style.color = parseFloat(wrPct) >= 50 ? 'var(--green)' : 'var(--red)';
  } else {
    pctEl.textContent = '—';
    pctEl.style.color = 'var(--muted)';
  }

  if (donutChart) donutChart.destroy();
  const ctx = document.getElementById('wrChart').getContext('2d');
  donutChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['Wins','Losses','Pending'],
      datasets: [{
        data: [wins, losses, pending],
        backgroundColor: ['rgba(34,211,163,0.85)','rgba(248,113,113,0.85)','rgba(251,191,36,0.5)'],
        borderColor: ['#22d3a3','#f87171','#fbbf24'],
        borderWidth: 1.5,
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '72%',
      plugins: {
        legend: {display:false},
        tooltip: {
          backgroundColor:'#1a1e2a', borderColor:'rgba(255,255,255,0.1)', borderWidth:1,
          titleColor:'#9ca3af', bodyColor:'#f0f2f8'
        }
      }
    }
  });

  document.getElementById('donutLegend').innerHTML = [
    {label:`Wins (${wins})`, color:'var(--green)'},
    {label:`Losses (${losses})`, color:'var(--red)'},
    {label:`Pending (${pending})`, color:'var(--amber)'}
  ].map(i=>`<div class="legend-item"><div class="legend-dot" style="background:${i.color}"></div><span style="color:var(--muted2);font-size:13px">${i.label}</span></div>`).join('');
}

function sportIcon(sport) {
  if (sport === 'nfl') return `<span class="sport-icon nfl" title="NFL">🏈</span>`;
  if (sport === 'other') return `<span class="sport-icon other" title="Other">⚽</span>`;
  return `<span class="sport-icon basketball" title="Basketball">🏀</span>`;
}

function renderTable(bets) {
  const tbody = document.getElementById('betsBody');
  const empty = document.getElementById('emptyState');
  const sorted = [...bets].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (!sorted.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';
  tbody.innerHTML = sorted.map((b)=>{
    const badge = b.outcome==='W'
      ? `<span class="outcome-badge outcome-W">W</span>`
      : b.outcome==='L'
      ? `<span class="outcome-badge outcome-L">L</span>`
      : `<span class="outcome-badge outcome-pending">Pending</span>`;
    const realIdx = allBets.indexOf(b);
    return `<tr>
      <td style="color:var(--muted2);white-space:nowrap">${b.date}</td>
      <td style="font-weight:500">${b.bet}</td>
      <td style="color:var(--muted2);font-size:12.5px"><div class="game-cell">${sportIcon(b.sport)}${b.game}</div></td>
      <td style="color:var(--amber)">${b.odd.toFixed(2)}</td>
      <td>€${b.stake.toFixed(2)}</td>
      <td>${badge}</td>
      <td style="display:flex;gap:6px;align-items:center;">
        <button class="delete-row-btn" onclick="openEditModal(${realIdx})" title="Edit" style="color:var(--muted)">✎</button>
        <button class="delete-row-btn" onclick="deleteBet(${realIdx})" title="Delete">✕</button>
      </td>
    </tr>`;
  }).join('');
}

function deleteBet(idx) {
  if (!confirm('Delete this bet?')) return;
  allBets.splice(idx, 1);
  saveData();
  render();
}

let editingIdx = null;

function openModal() {
  editingIdx = null;
  document.getElementById('modalTitle').textContent = 'Add New Bet';
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-bet').value = '';
  document.getElementById('f-game').value = '';
  document.getElementById('f-odd').value = '';
  document.getElementById('f-stake').value = '';
  document.getElementById('f-outcome').value = '';
  document.getElementById('f-sport').value = 'basketball';
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditModal(idx) {
  const b = allBets[idx];
  if (!b) return;
  editingIdx = idx;
  document.getElementById('modalTitle').textContent = 'Edit Bet';
  const parts = b.date.split('/');
  const iso = `${parts[2]}-${String(parts[0]).padStart(2,'0')}-${String(parts[1]).padStart(2,'0')}`;
  document.getElementById('f-date').value = iso;
  document.getElementById('f-bet').value = b.bet;
  document.getElementById('f-game').value = b.game === '—' ? '' : b.game;
  document.getElementById('f-odd').value = b.odd;
  document.getElementById('f-stake').value = b.stake;
  document.getElementById('f-outcome').value = b.outcome || '';
  document.getElementById('f-sport').value = b.sport || 'basketball';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingIdx = null;
}

function handleOverlayClick(e) { if (e.target === e.currentTarget) closeModal(); }

function saveBet() {
  const date = document.getElementById('f-date').value;
  const bet = document.getElementById('f-bet').value.trim();
  const game = document.getElementById('f-game').value.trim();
  const odd = parseFloat(document.getElementById('f-odd').value);
  const stake = parseFloat(document.getElementById('f-stake').value);
  const outcome = document.getElementById('f-outcome').value;
  const sport = document.getElementById('f-sport').value;

  if (!date || !bet || isNaN(odd) || isNaN(stake)) {
    alert('Please fill in Date, Bet, Odd and Stake.');
    return;
  }

  const d = new Date(date);
  const formatted = `${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
  const entry = {date: formatted, bet, game: game||'—', odd, stake, outcome, sport};

  if (editingIdx !== null) {
    allBets[editingIdx] = entry;
  } else {
    allBets.push(entry);
  }

  saveData();
  const newKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  activeMonth = newKey;
  closeModal();
  render();
}

render();
</script>
