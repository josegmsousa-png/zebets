<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* DARK THEME (default) — original */
  :root, [data-theme="dark"] {
    --bg: #0d0f14; --surface: #13161f; --surface2: #1a1e2a; --surface3: #20253a;
    --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
    --text: #f0f2f8; --muted: #6b7280; --muted2: #9ca3af;
    --accent: #6c63ff; --accent2: #8b85ff;
    --green: #22d3a3; --green-bg: rgba(34,211,163,0.1);
    --red: #f87171; --red-bg: rgba(248,113,113,0.1);
    --amber: #fbbf24;
    --header-bg: rgba(13,15,20,0.92);
    --shadow: none;
  }

  /* LIGHT THEME — warm parchment */
  [data-theme="light"] {
    --bg: #f5eedc; --surface: #fdf7eb; --surface2: #ede3c8; --surface3: #e0d4b0;
    --border: rgba(120,90,30,0.12); --border2: rgba(120,90,30,0.22);
    --text: #2c1e0f; --muted: #8a7355; --muted2: #5c4a2a;
    --accent: #6c63ff; --accent2: #8b85ff;
    --green: #1a7a5e; --green-bg: rgba(26,122,94,0.1);
    --red: #c0392b; --red-bg: rgba(192,57,43,0.1);
    --amber: #b8620a;
    --header-bg: rgba(245,238,220,0.95);
    --shadow: 0 1px 4px rgba(100,70,20,0.1);
  }

  /* THEME TOGGLE BUTTON */
  .theme-btn {
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--muted2); width: 36px; height: 36px; border-radius: 50%;
    font-size: 17px; cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: all 0.2s; flex-shrink: 0;
  }
  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }

  :root { --radius-sm: 10px; --radius: 16px; --radius-lg: 22px; --radius-xl: 28px; }

  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 15px; line-height: 1.6; transition: background 0.3s, color 0.3s; }
  header { padding: 1rem 2.5rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--header-bg); backdrop-filter: blur(16px); z-index: 100; box-shadow: var(--shadow); }
  .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .logo-text { font-family: 'DM Serif Display', serif; font-size: 1.8rem; font-weight: 700; font-style: italic; letter-spacing: -0.03em; background: linear-gradient(135deg, #6c63ff, #22d3a3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
  .logo-text span { font-style: normal; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .month-tabs { display: flex; gap: 8px; padding: 1rem 2.5rem 0; overflow-x: auto; scrollbar-width: none; }
  .month-tabs::-webkit-scrollbar { display: none; }
  .tab-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted2); padding: 7px 18px; border-radius: 50px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .tab-btn:hover { border-color: var(--border2); color: var(--text); }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  main { padding: 1.2rem 2.5rem 4rem; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 1.2rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.3rem; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; box-shadow: var(--shadow); }
  .stat-card:hover { border-color: var(--border2); transform: translateY(-2px); }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .stat-value { font-size: 1.7rem; font-weight: 600; line-height: 1; margin-bottom: 3px; }
  .stat-sub { font-size: 11px; color: var(--muted); }
  .stat-card.accent { border-color: rgba(108,99,255,0.3); background: rgba(108,99,255,0.06); }
  .stat-card.green { border-color: rgba(34,211,163,0.25); background: var(--green-bg); }
  .stat-card.green .stat-value { color: var(--green); }
  .stat-card.red { border-color: rgba(248,113,113,0.25); background: var(--red-bg); }
  .stat-card.red .stat-value { color: var(--red); }
  .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 1.2rem; }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.2rem; box-shadow: var(--shadow); }
  .chart-title { font-size: 12px; font-weight: 500; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.8rem; }
  .chart-wrap { position: relative; height: 200px; }
  .donut-legend { display: flex; flex-direction: column; gap: 6px; margin-top: 0.8rem; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .bets-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); }
  .bets-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.2rem; border-bottom: 1px solid var(--border); }
  .bets-title { font-size: 12px; font-weight: 500; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.07em; }
  .add-btn { background: var(--accent); color: #fff; border: none; padding: 7px 14px; border-radius: 50px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: background 0.2s, transform 0.15s; }
  .add-btn:hover { background: var(--accent2); transform: scale(1.03); }
  .plus-icon { width: 15px; height: 15px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.2); border-radius: 50%; font-size: 13px; line-height: 1; }

  /* TABLE — desktop */
  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: var(--surface2); color: var(--muted); font-weight: 500; font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.08em; padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 10px 12px; vertical-align: middle; }

  /* MOBILE CARD TABLE */
  .mobile-bets { display: none; }
  .bet-card-mobile { border-bottom: 1px solid var(--border); padding: 12px 14px; transition: background 0.15s; }
  .bet-card-mobile:last-child { border-bottom: none; }
  .bet-card-mobile-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .bet-card-mobile-bottom { display: flex; align-items: center; justify-content: space-between; }
  .bet-card-actions { display: flex; gap: 4px; }

  .outcome-badge { display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 50px; font-size: 11px; font-weight: 600; }
  .outcome-W { background: var(--green-bg); color: var(--green); }
  .outcome-L { background: var(--red-bg); color: var(--red); }
  .outcome-pending { background: rgba(251,191,36,0.12); color: var(--amber); }
  .delete-row-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 3px 6px; border-radius: 6px; transition: color 0.15s, background 0.15s; font-family: 'DM Sans', sans-serif; }
  .delete-row-btn:hover { color: var(--red); background: var(--red-bg); }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius-xl); padding: 1.8rem; width: 92%; max-width: 480px; transform: translateY(20px) scale(0.97); transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1); box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }
  .modal-title { font-family: 'DM Serif Display', serif; font-size: 1.3rem; margin-bottom: 1.3rem; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 11px; font-weight: 500; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.07em; }
  input, select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: var(--radius-sm); padding: 9px 11px; font-size: 14px; font-family: 'DM Sans', sans-serif; outline: none; transition: border-color 0.2s; width: 100%; }
  input:focus, select:focus { border-color: var(--accent); }
  select option { background: var(--surface2); color: var(--text); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.3rem; }
  .btn-cancel { background: none; border: 1px solid var(--border2); color: var(--muted2); padding: 9px 18px; border-radius: 50px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
  .btn-cancel:hover { color: var(--text); }
  .btn-save { background: var(--accent); border: none; color: #fff; padding: 9px 22px; border-radius: 50px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.15s; }
  .btn-save:hover { background: var(--accent2); }
  .empty-state { padding: 2.5rem; text-align: center; color: var(--muted); font-size: 14px; }
  .sport-icon { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; font-size: 12px; flex-shrink: 0; margin-right: 5px; vertical-align: middle; }
  .sport-icon.basketball { background: rgba(251,146,60,0.15); }
  .sport-icon.nfl { background: rgba(139,92,246,0.15); }
  .sport-icon.soccer { background: rgba(34,197,94,0.15); }
  .sport-icon.other { background: rgba(156,163,175,0.12); }
  .game-cell { display: flex; align-items: center; }
  .add-month-btn { background: none; border: 1px dashed var(--border2); color: var(--muted); padding: 7px 16px; border-radius: 50px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
  .add-month-btn:hover { border-color: var(--accent); color: var(--accent); }
  /* ACCA STYLES */
  .acca-header-row td { background: var(--surface2); border-left: 3px solid var(--amber) !important; }
  .acca-leg-row td { background: var(--surface); border-left: 3px solid rgba(251,191,36,0.2) !important; }
  .acca-leg-row td:first-child { padding-left: 24px !important; }
  .acca-badge { display:inline-flex;align-items:center;gap:4px;background:rgba(251,191,36,0.12);color:var(--amber);border-radius:50px;padding:2px 8px;font-size:11px;font-weight:600; }
  .acca-toggle { background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px 6px;border-radius:4px;transition:color 0.15s; }
  .acca-toggle:hover { color:var(--amber); }
  .leg-row { display:grid;grid-template-columns:1fr 1fr 80px 28px;gap:8px;align-items:center; }
  .leg-row input, .leg-row select { padding:7px 10px;font-size:13px; }

  .loading-bar { position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, var(--accent), var(--green)); z-index: 999; transition: width 0.3s ease; width: 0%; }

  /* DESKTOP RESPONSIVE */
  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(3, 1fr); }
  }

  /* MOBILE */
  @media (max-width: 640px) {
    header { padding: 0.8rem 1rem; }
    main, .month-tabs { padding-left: 1rem; padding-right: 1rem; }
    .logo-text { font-size: 1.4rem; }
    .logo img { width: 32px; height: 32px; }
    #header-month { display: none; }
    .charts-row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .stat-value { font-size: 1.4rem; }
    main { padding-top: 1rem; padding-bottom: 3rem; }

    /* Hide desktop table, show mobile cards */
    .table-wrap { display: none; }
    .mobile-bets { display: block; }
    .form-grid { grid-template-columns: 1fr 1fr; }
    .form-grid[style*="1fr 1fr 1fr"] { grid-template-columns: 1fr 1fr !important; }
  }
</style>
</head>

<script>
const SUPABASE_URL = 'https://vgsvhixbvosimiemooiw.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZnc3ZoaXhidm9zaW1pZW1vb2l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NzMzMTgsImV4cCI6MjA5MjU0OTMxOH0.a3DiUpZUaOEtuEHg66RSKtcXCiHlN6LiRYkx1TFoPss';

function sbFetch(path, method='GET', body=null, extraHeaders={}) {
  const headers = {
    'apikey': SUPABASE_ANON,
    'Authorization': 'Bearer ' + SUPABASE_ANON,
    'Content-Type': 'application/json',
    'Accept': 'application/json',
    ...extraHeaders
  };
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  return fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
}

async function dbGetAll() {

function computeDailyBalances(monthKey) {
  const [y, m] = monthKey.split('-').map(Number);
  const monthBets = allBets.filter(b => {
    if (b.bet === '__month_placeholder__') return false;
    const d = new Date(b.date);
    return d.getFullYear() === y && d.getMonth() + 1 === m;
  });
  const byDay = {};
  for (const b of monthBets) {
    if (!byDay[b.date]) byDay[b.date] = [];
    byDay[b.date].push(b);
  }
  const days = Object.keys(byDay).sort((a, b) => new Date(a) - new Date(b));
  if (!days.length) return [];
  const seedKey = Object.keys(SEED_BALANCE).find(k => {
    const d = new Date(k);
    return d.getFullYear() === y && d.getMonth() + 1 === m;
  });
  let runningBalance = seedKey ? SEED_BALANCE[seedKey] : null;
  if (runningBalance === null) {
    const prevMonthDate = new Date(y, m - 2, 1);
    const prevKey = prevMonthDate.getFullYear() + '-' + String(prevMonthDate.getMonth()+1).padStart(2,'0');
    const prevEntries = computeDailyBalances(prevKey);
    runningBalance = prevEntries.length ? prevEntries[prevEntries.length - 1][1] : 0;
  }
  const result = [];
  for (const day of days) {
    let dayPnl = 0;
    for (const b of byDay[day]) {
      // For acca legs, only process leg 1 (which holds the stake) using combined odd
      if (b.acca_id) {
        if (b.acca_leg === 1) {
          const stake = b.acca_stake || b.stake;
          const combinedOdd = parseFloat((b.acca_combined_odd || b.odd).toFixed(2));
          if (b.outcome === 'W') dayPnl += stake * combinedOdd - stake;
          else if (b.outcome === 'L') dayPnl -= stake;
          else dayPnl -= stake; // pending
        }
        // skip legs 2, 3, etc — already handled by leg 1
      } else {
        // Regular single bet
        if (b.outcome === 'W') dayPnl += b.stake * b.odd - b.stake;
        else if (b.outcome === 'L') dayPnl -= b.stake;
        else dayPnl -= b.stake; // pending
      }
    }
    runningBalance = parseFloat((runningBalance + dayPnl).toFixed(2));
    result.push([day, runningBalance]);
  }
  return result;
}

function getMonths() {
  if (!allBets.length) return ['2026-04'];
  const months = new Set(allBets.map(b => {
    const d = new Date(b.date);
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
  }));
  return [...months].sort();
}

function monthLabel(key) {
  const [y,m] = key.split('-');
  return new Date(y, m-1, 1).toLocaleDateString('en-US', {month:'long', year:'numeric'});
}

function betsForMonth(key) {
  return allBets.filter(b => {
    if (b.bet === '__month_placeholder__') return false;
    const d = new Date(b.date);
    const k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    return k === key;
  });
}

function renderTabs() {
  const tabs = document.getElementById('monthTabs');
  const months = getMonths();
  if (!activeMonth || !months.includes(activeMonth)) activeMonth = months[months.length-1];
  const lastMonth = months[months.length-1];
  const [ly, lm] = lastMonth.split('-').map(Number);
  const nextDate = new Date(ly, lm, 1);
  const nextKey = nextDate.getFullYear() + '-' + String(nextDate.getMonth()+1).padStart(2,'0');
  const nextLabel = nextDate.toLocaleDateString('en-US', {month:'long', year:'numeric'});
  tabs.innerHTML = months.map(m =>
    '<button class="tab-btn' + (m===activeMonth?' active':'') + '" onclick="selectMonth(\'' + m + '\')">' + monthLabel(m) + '</button>'
  ).join('') + '<button class="add-month-btn" onclick="addMonth(\'' + nextKey + '\')">+ ' + nextLabel + '</button>';
  document.getElementById('header-month').textContent = monthLabel(activeMonth);
}

async function addMonth(key) {
  const months = getMonths();
  if (!months.includes(key)) {
    const [y, m] = key.split('-').map(Number);
    const placeholder = {
      date: m + '/1/' + y,
      bet: '__month_placeholder__',
      game: '—',
      odd: 0,
      stake: 0,
      outcome: '',
      sport: 'basketball'
    };
    try {
      const newRow = await dbInsert(placeholder);
      allBets.push({ ...placeholder, id: newRow.id });
    } catch(e) {
      console.error('Failed to create month:', e);
    }
  }
  activeMonth = key;
  render();
}
function selectMonth(m) { activeMonth = m; render(); }

function render() {
  renderTabs();
  const months = getMonths().filter(m => m <= activeMonth);

  // Current month bets (for table + chart)
  const bets = betsForMonth(activeMonth);

  // Cumulative bets up to and including active month
  const allUpToNow = allBets.filter(b => {
    if (b.bet === '__month_placeholder__') return false;
    const d = new Date(b.date);
    const k = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    return k <= activeMonth;
  });
  const settledAll = allUpToNow.filter(b => b.outcome === 'W' || b.outcome === 'L');
  const winsAll = settledAll.filter(b => b.outcome === 'W' && (!b.acca_id || b.acca_leg === 1)).length;
  const lossesAll = settledAll.filter(b => b.outcome === 'L' && (!b.acca_id || b.acca_leg === 1)).length;
  const wrAll = (winsAll + lossesAll) > 0 ? ((winsAll/(winsAll+lossesAll))*100).toFixed(1) : '—';

  // P&L: for accas only count leg 1 with combined odd
  let totalStakeAll = 0, totalReturnAll = 0;
  for (const b of allUpToNow) {
    if (b.acca_id && b.acca_leg !== 1) continue; // skip non-first acca legs
    const stake = b.acca_id ? (b.acca_stake || b.stake) : b.stake;
    const odd = b.acca_id ? parseFloat((b.acca_combined_odd || b.odd).toFixed(2)) : b.odd;
    if (b.outcome === 'W' || b.outcome === 'L') {
      totalStakeAll += stake;
      if (b.outcome === 'W') totalReturnAll += stake * odd;
    }
  }
  const pnlAll = totalReturnAll - totalStakeAll;

  // Balance: current = last entry of active month, started = SEED (always €35)
  const balEntries = computeDailyBalances(activeMonth);
  const currentBalance = balEntries.length ? balEntries[balEntries.length-1][1] : null;
  const startingBalance = SEED_BALANCE[Object.keys(SEED_BALANCE)[0]]; // always 35
  const balDisplay = currentBalance !== null ? '€' + currentBalance.toFixed(2) : '—';
  const balColor = currentBalance !== null ? (currentBalance >= SEED_BALANCE[Object.keys(SEED_BALANCE)[0]] ? 'var(--green)' : 'var(--red)') : 'var(--muted2)';
  const startDisplay = 'Started at €' + startingBalance.toFixed(2);
  const pendingBets = bets.filter(b => !b.outcome && (!b.acca_id || b.acca_leg === 1));
  const pendingStake = pendingBets.reduce((s,b) => s + (b.acca_id ? (b.acca_stake||b.stake) : b.stake), 0);
  const pendingSub = pendingStake > 0 ? `${startDisplay} · €${pendingStake.toFixed(2)} staked` : startDisplay;

  const roi = totalStakeAll > 0 ? ((pnlAll / totalStakeAll) * 100) : null;
  const roiDisplay = roi !== null ? (roi >= 0 ? '+' : '') + roi.toFixed(1) + '%' : '—';
  const roiColor = roi === null ? 'var(--muted2)' : roi >= 0 ? 'var(--green)' : 'var(--red)';

  // Month-only W/L for donut
  const settled = bets.filter(b => b.outcome === 'W' || b.outcome === 'L');
  const wins = settled.filter(b => b.outcome === 'W').length;
  const losses = settled.filter(b => b.outcome === 'L').length;

  const settledCount = allUpToNow.filter(b => (b.outcome==='W'||b.outcome==='L') && (!b.acca_id || b.acca_leg===1)).length;
  const totalBetsCount = allUpToNow.filter(b => !b.acca_id || b.acca_leg===1).length;

  document.getElementById('statsGrid').innerHTML =
    '<div class="stat-card accent"><div class="stat-label">Total Bets</div><div class="stat-value" style="color:var(--accent2)">' + totalBetsCount + '</div><div class="stat-sub">' + settledCount + ' settled · ' + monthLabel(activeMonth) + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Current Balance</div><div class="stat-value" style="color:' + balColor + '">' + balDisplay + '</div><div class="stat-sub">' + pendingSub + '</div></div>' +
    '<div class="stat-card green"><div class="stat-label">Win Rate</div><div class="stat-value">' + wrAll + (wrAll!=='—'?'%':'') + '</div><div class="stat-sub">' + winsAll + 'W / ' + lossesAll + 'L (all time)</div></div>' +
    '<div class="stat-card"><div class="stat-label">ROI</div><div class="stat-value" style="color:' + roiColor + '">' + roiDisplay + '</div><div class="stat-sub">return on stake</div></div>' +
    '<div class="stat-card ' + (pnlAll>=0?'green':'red') + '"><div class="stat-label">P&L</div><div class="stat-value">' + (pnlAll>=0?'+':'') + '€' + pnlAll.toFixed(2) + '</div><div class="stat-sub">Staked €' + totalStakeAll.toFixed(2) + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Avg Odd</div><div class="stat-value" style="color:var(--amber)">' + (totalBetsCount ? (allUpToNow.filter(b=>!b.acca_id||b.acca_leg===1).reduce((s,b)=>s+(b.acca_id?b.acca_combined_odd||b.odd:b.odd),0)/totalBetsCount).toFixed(2) : '—') + '</div><div class="stat-sub">per bet</div></div>';

  renderBalanceChart();
  renderDonutChart(wins, losses, bets.length - settled.length);
  renderTable(bets);
}

function renderBalanceChart() {
  const balEntries = computeDailyBalances(activeMonth);
  const year = activeMonth.split('-')[0];
  const labels = balEntries.map(([d]) => d.replace('/' + year, ''));
  const data = balEntries.map(([, v]) => v);
  if (balChart) balChart.destroy();
  const ctx = document.getElementById('balanceChart').getContext('2d');
  const grad = ctx.createLinearGradient(0,0,0,200);
  grad.addColorStop(0,'rgba(108,99,255,0.35)');
  grad.addColorStop(1,'rgba(108,99,255,0)');
  balChart = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [{ data, borderColor:'#6c63ff', backgroundColor:grad, borderWidth:2.5, pointBackgroundColor:'#6c63ff', pointRadius:4, pointHoverRadius:6, fill:true, tension:0.4 }] },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false}, tooltip:{ backgroundColor:'#1a1e2a', borderColor:'rgba(255,255,255,0.1)', borderWidth:1, titleColor:'#9ca3af', bodyColor:'#f0f2f8', callbacks:{ label: c=>'€'+c.parsed.y.toFixed(2) } } },
      scales:{ x:{ grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#6b7280',font:{size:11}} }, y:{ grid:{color:'rgba(255,255,255,0.04)'}, ticks:{color:'#6b7280',font:{size:11},callback:v=>'€'+v} } }
    }
  });
}

function renderDonutChart(wins, losses, pending) {
  lastDonutArgs = [wins, losses, pending];
  const settled = wins + losses;
  const wrPct = settled ? ((wins/settled)*100).toFixed(1) : null;
  const pctEl = document.getElementById('wrPct');
  pctEl.textContent = wrPct !== null ? wrPct + '%' : '—';
  pctEl.style.color = wrPct !== null ? (parseFloat(wrPct)>=50?'var(--green)':'var(--red)') : 'var(--muted)';
  if (donutChart) donutChart.destroy();
  const ctx = document.getElementById('wrChart').getContext('2d');
  donutChart = new Chart(ctx, {
    type:'doughnut',
    data:{ labels:['Wins','Losses','Pending'], datasets:[{ data:[wins,losses,pending], backgroundColor:['rgba(34,211,163,0.85)','rgba(248,113,113,0.85)','rgba(251,191,36,0.5)'], borderColor:['#22d3a3','#f87171','#fbbf24'], borderWidth:1.5, hoverOffset:6 }] },
    options:{ responsive:true, maintainAspectRatio:false, cutout:'72%', plugins:{ legend:{display:false}, tooltip:{ backgroundColor:'#1a1e2a', borderColor:'rgba(255,255,255,0.1)', borderWidth:1, titleColor:'#9ca3af', bodyColor:'#f0f2f8' } } }
  });
  document.getElementById('donutLegend').innerHTML =
    [['Wins ('+wins+')','var(--green)'],['Losses ('+losses+')','var(--red)'],['Pending ('+pending+')','var(--amber)']].map(([l,c])=>
      '<div class="legend-item"><div class="legend-dot" style="background:'+c+'"></div><span style="color:var(--muted2);font-size:13px">'+l+'</span></div>'
    ).join('');
}

function getTeamLogo(teamName, sport) {
  const keyCheck = teamName.toLowerCase().trim();
  if (EMBEDDED_LOGOS[keyCheck]) return EMBEDDED_LOGOS[keyCheck];
  if (sport === 'soccer') return getSoccerLogo(teamName);
  const key = teamName.toLowerCase().trim()
    .replace(/\s+/g, ' ')
    .replace(/[–—]/g, '-');
  const logos = sport === 'nfl' ? NFL_LOGOS : NBA_LOGOS;
  if (logos[key]) {
    const abbr = logos[key];
    const league = sport === 'nfl' ? 'nfl' : 'nba';
    return 'https://a.espncdn.com/combiner/i?img=/i/teamlogos/' + league + '/500/' + abbr + '.png&w=40&h=40';
  }
  const found = Object.keys(logos).find(k => key.includes(k) || k.includes(key));
  if (found) {
    const abbr = logos[found];
    const league = sport === 'nfl' ? 'nfl' : 'nba';
    return 'https://a.espncdn.com/combiner/i?img=/i/teamlogos/' + league + '/500/' + abbr + '.png&w=40&h=40';
  }
  return null;
}

function teamLogoImg(teamName, sport) {
  const url = getTeamLogo(teamName, sport);
  if (!url) return '<div style="width:22px;height:22px;border-radius:50%;background:var(--surface3);flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted)">?</div>';
  return '<img src="' + url + '" alt="' + teamName + '" style="width:22px;height:22px;border-radius:50%;object-fit:contain;background:rgba(255,255,255,0.06);flex-shrink:0;" onerror="this.style.display=\'none\'">';
}

function gameLogos(gameStr, sport) {
  // Support ' - ', ' – ', ' — ', ' vs ', ' vs. ' as separators
  const separatorMatch = gameStr.match(/\s[-–—]\s|\svs\.?\s/i);
  let t1, t2;
  if (separatorMatch) {
    const idx = gameStr.indexOf(separatorMatch[0]);
    t1 = gameStr.slice(0, idx).trim();
    t2 = gameStr.slice(idx + separatorMatch[0].length).trim();
  } else {
    // fallback: split on first ' - '
    const parts = gameStr.split('-');
    if (parts.length < 2) return '<div class="game-cell">' + gameStr + '</div>';
    t1 = parts[0].trim();
    t2 = parts.slice(1).join('-').trim();
  }
  return '<div class="game-cell" style="gap:5px;align-items:center;">' +
    teamLogoImg(t1, sport) +
    '<span style="color:var(--muted);font-size:11px;margin:0 2px;">vs</span>' +
    teamLogoImg(t2, sport) +
    '<span style="margin-left:4px;font-size:12px;color:var(--muted2)">' + t1 + ' — ' + t2 + '</span>' +
  '</div>';
}

function betPnl(b) {
  if (!b.outcome) return '<span style="color:var(--muted);font-size:12px;">—</span>';
  if (b.outcome === 'W') {
    const profit = parseFloat(((b.stake * b.odd) - b.stake).toFixed(2));
    return '<span style="color:var(--green);font-weight:600;font-size:13px;">+€' + profit.toFixed(2) + '</span>';
  }
  return '<span style="color:var(--red);font-weight:600;font-size:13px;">−€' + b.stake.toFixed(2) + '</span>';
}

function sportIcon(sport) {
  if (sport==='nfl') return '<span class="sport-icon nfl">🏈</span>';
  if (sport==='soccer') return '<span class="sport-icon soccer">⚽</span>';
  if (sport==='other') return '<span class="sport-icon other">🎯</span>';
  return '<span class="sport-icon basketball">🏀</span>';
}

function betRow(b, hideGame) {
  const badge = b.outcome==='W' ? '<span class="outcome-badge outcome-W">W</span>'
    : b.outcome==='L' ? '<span class="outcome-badge outcome-L">L</span>'
    : '<span class="outcome-badge outcome-pending">—</span>';
  const gameCell = hideGame
    ? '<td style="color:var(--muted);font-size:12px;padding-left:28px;">↳ same game</td>'
    : '<td>' + gameLogos(b.game, b.sport) + '</td>';
  return '<tr>' +
    '<td style="color:var(--muted2);white-space:nowrap">' + b.date + '</td>' +
    '<td>' + sportIcon(b.sport) + '</td>' +
    '<td style="font-weight:500">' + b.bet + '</td>' +
    gameCell +
    '<td style="color:var(--amber)">' + b.odd.toFixed(2) + '</td>' +
    '<td>€' + b.stake.toFixed(2) + '</td>' +
    '<td>' + badge + '</td>' +
    '<td>' + betPnl(b) + '</td>' +
    '<td style="display:flex;gap:6px;align-items:center;">' +
      '<button class="delete-row-btn" onclick="openEditModal(\'' + b.id + '\')" title="Edit" style="color:var(--muted)">✎</button>' +
      '<button class="delete-row-btn" onclick="deleteBet(\'' + b.id + '\')" title="Delete">✕</button>' +
    '</td></tr>';
}

function renderTable(bets) {
  const tbody = document.getElementById('betsBody');
  const mobileBets = document.getElementById('mobileBets');
  const empty = document.getElementById('emptyState');

  const sorted = [...bets].sort((a, b) => {
    const dateDiff = new Date(b.date) - new Date(a.date);
    if (dateDiff !== 0) return dateDiff;
    // Keep acca legs together
    if (a.acca_id && a.acca_id === b.acca_id) return a.acca_leg - b.acca_leg;
    return a.game.localeCompare(b.game);
  });

  if (!sorted.length) {
    tbody.innerHTML = '';
    mobileBets.innerHTML = '<div class="empty-state">No bets for this month yet.</div>';
    empty.style.display = 'none';
    return;
  }
  empty.style.display = 'none';

  // Separate singles and accas
  const rendered = new Set();
  let html = '';

  for (const b of sorted) {
    if (rendered.has(b.id)) continue;

    if (b.acca_id) {
      const legs = sorted.filter(x => x.acca_id === b.acca_id);
      legs.forEach(l => rendered.add(l.id));

      const combinedOdd = parseFloat((b.acca_combined_odd || legs.reduce((p,l) => p*l.odd,1)).toFixed(2));
      const stake = b.acca_stake || b.stake;
      const outcome = getAccaOutcome(b.acca_id);
      const foldName = legs.length === 2 ? 'Double' : legs.length === 3 ? 'Treble' : legs.length + '-Fold';
      const badge = outcome==='W' ? '<span class="outcome-badge outcome-W">W</span>'
        : outcome==='L' ? '<span class="outcome-badge outcome-L">L</span>'
        : '<span class="outcome-badge outcome-pending">—</span>';
      const pnl = !outcome ? '<span style="color:var(--muted);font-size:12px;">—</span>'
        : outcome==='W' ? '<span style="color:var(--green);font-weight:600;">+€'+(stake*combinedOdd-stake).toFixed(2)+'</span>'
        : '<span style="color:var(--red);font-weight:600;">−€'+parseFloat(stake).toFixed(2)+'</span>';

      const totalRows = 1 + legs.length;

      // Header row — sport+bet merged into one colspan=2
      html += `<tr style="border-bottom:none;">
        <td style="color:var(--muted2);white-space:nowrap;padding-bottom:2px;">${b.date}</td>
        <td style="padding-bottom:2px;"><span class="acca-badge">⚡</span></td>
        <td style="font-weight:500;color:var(--text);padding-bottom:2px;">${foldName}</td>
        <td style="padding-bottom:2px;"></td>
        <td style="color:var(--amber);font-weight:700;padding-bottom:2px;">${combinedOdd.toFixed(2)}</td>
        <td style="padding-bottom:2px;">€${parseFloat(stake).toFixed(2)}</td>
        <td style="padding-bottom:2px;">${badge}</td>
        <td style="padding-bottom:2px;">${pnl}</td>
        <td style="padding-bottom:2px;"><button class="delete-row-btn" onclick="deleteAcca('${b.acca_id}')" title="Delete acca">✕</button></td>
      </tr>`;

      // Leg rows — date empty, only Bet column indented
      legs.forEach((leg, i) => {
        const isLast = i === legs.length - 1;
        const legOutcome = leg.outcome;
        const legBadge = legOutcome==='W' ? '<span class="outcome-badge outcome-W">W</span>'
          : legOutcome==='L' ? '<span class="outcome-badge outcome-L">L</span>'
          : '<span class="outcome-badge outcome-pending">—</span>';
        const pt = 'padding-top:2px;';
        const pb = isLast ? 'padding-bottom:9px;' : 'padding-bottom:2px;';
        const border = isLast ? '' : 'border-bottom:none;';
        html += `<tr style="${border}">
          <td style="${pt}${pb}color:var(--muted);font-size:12px;">—</td>
          <td style="${pt}${pb}">${sportIcon(leg.sport)}</td>
          <td style="${pt}${pb}padding-left:14px;color:var(--muted2);font-size:13px;"><span style="color:var(--amber);margin-right:5px;">›</span>${leg.bet}</td>
          <td style="${pt}${pb}">${gameLogos(leg.game, leg.sport)}</td>
          <td style="${pt}${pb}color:var(--muted);font-size:12px;">${leg.odd.toFixed(2)}</td>
          <td style="${pt}${pb}color:var(--muted);font-size:12px;">—</td>
          <td style="${pt}${pb}">${legBadge}</td>
          <td style="${pt}${pb}color:var(--muted);font-size:12px;">—</td>
          <td style="${pt}${pb}"><button class="delete-row-btn" onclick="openEditModal('${leg.id}')" title="Edit" style="color:var(--muted)">✎</button></td>
        </tr>`;
      });
    } else {
      // Normal single bet
      rendered.add(b.id);
      html += betRow(b, false);
    }
  }

  tbody.innerHTML = html;

  // ── MOBILE CARDS ────────────────────────────────────────────────────────
  const mobileRendered = new Set();
  let mobileHtml = '';

  for (const b of sorted) {
    if (mobileRendered.has(b.id)) continue;

    if (b.acca_id) {
      const legs = sorted.filter(x => x.acca_id === b.acca_id);
      legs.forEach(l => mobileRendered.add(l.id));

      const combinedOdd = parseFloat((b.acca_combined_odd || legs.reduce((p,l) => p*l.odd,1)).toFixed(2));
      const stake = b.acca_stake || b.stake;
      const outcome = getAccaOutcome(b.acca_id);
      const foldName = legs.length === 2 ? 'Double' : legs.length === 3 ? 'Treble' : legs.length + '-Fold';
      const badge = outcome==='W' ? '<span class="outcome-badge outcome-W">W</span>'
        : outcome==='L' ? '<span class="outcome-badge outcome-L">L</span>'
        : '<span class="outcome-badge outcome-pending">—</span>';
      const pnl = !outcome ? '<span style="color:var(--muted);font-size:12px;">—</span>'
        : outcome==='W' ? '<span style="color:var(--green);font-weight:600;">+€'+(stake*combinedOdd-stake).toFixed(2)+'</span>'
        : '<span style="color:var(--red);font-weight:600;">−€'+parseFloat(stake).toFixed(2)+'</span>';

      const legsHtml = legs.map(leg => {
        const lo = leg.outcome;
        const tick = lo==='W' ? '<span style="color:var(--green);font-weight:700;">✓</span>'
          : lo==='L' ? '<span style="color:var(--red);font-weight:700;">✗</span>'
          : '<span style="color:var(--muted);">—</span>';
        return `<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-top:1px solid var(--border);">
          ${sportIcon(leg.sport)}
          <span style="flex:1;font-size:12px;color:var(--muted2);">${leg.bet} <span style="color:var(--muted);font-size:11px;">· ${leg.odd.toFixed(2)}</span></span>
          <span style="font-size:13px;">${tick}</span>
          <button class="delete-row-btn" onclick="openEditModal('${leg.id}')" style="color:var(--muted);font-size:13px;">✎</button>
        </div>`;
      }).join('');

      mobileHtml += `<div class="bet-card-mobile">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="acca-badge">⚡ ${foldName}</span>
            <span style="font-size:12px;color:var(--muted);">${b.date}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            ${badge}
            <button class="delete-row-btn" onclick="deleteAcca('${b.acca_id}')">✕</button>
          </div>
        </div>
        ${legsHtml}
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:6px;border-top:1px solid var(--border);">
          <span style="font-size:12px;color:var(--muted);">Odd <strong style="color:var(--amber);">${combinedOdd.toFixed(2)}</strong> · €${parseFloat(stake).toFixed(2)}</span>
          ${pnl}
        </div>
      </div>`;

    } else {
      mobileRendered.add(b.id);
      const badge = b.outcome==='W' ? '<span class="outcome-badge outcome-W">W</span>'
        : b.outcome==='L' ? '<span class="outcome-badge outcome-L">L</span>'
        : '<span class="outcome-badge outcome-pending">—</span>';
      const parts = b.game.split(/\s[-–—]\s|\svs\.?\s/i);
      const gameShort = parts.length >= 2 ? (parts[0].split(' ').pop() + ' vs ' + parts[1].split(' ').pop()) : b.game;
      mobileHtml += `<div class="bet-card-mobile">
        <div class="bet-card-mobile-top">
          <div>
            <div style="font-weight:600;font-size:14px;">${b.bet}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;">${sportIcon(b.sport)}${gameShort} · ${b.date}</div>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">${badge}
            <div class="bet-card-actions">
              <button class="delete-row-btn" onclick="openEditModal('${b.id}')" style="color:var(--muted)">✎</button>
              <button class="delete-row-btn" onclick="deleteBet('${b.id}')">✕</button>
            </div>
          </div>
        </div>
        <div class="bet-card-mobile-bottom">
          <span style="font-size:12px;color:var(--muted);">Odd <strong style="color:var(--amber)">${b.odd.toFixed(2)}</strong> · €${b.stake.toFixed(2)}</span>
          ${betPnl(b)}
        </div>
      </div>`;
    }
  }

  mobileBets.innerHTML = mobileHtml || '<div class="empty-state">No bets for this month yet.</div>';
}

async function deleteBet(id) {
  if (!confirm('Delete this bet?')) return;
  try { await dbDelete(id); allBets = allBets.filter(b=>b.id!==id); render(); }
  catch(e) { alert('Error: ' + e.message); }
}

let editingId = null;

function openModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Add New Bet';
  document.getElementById('f-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('f-bet').value = '';
  document.getElementById('f-game').value = '';
  document.getElementById('f-odd').value = '';
  document.getElementById('f-stake').value = '';
  document.getElementById('f-outcome').value = '';
  document.getElementById('f-sport').value = 'basketball';
  document.getElementById('outcome-group').style.display = 'none';
  document.getElementById('modalOverlay').classList.add('open');
}

function openEditModal(id) {
  const b = allBets.find(x => x.id === id);
  if (!b) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = b.acca_id ? 'Edit Acca Leg' : 'Edit Bet';
  const parts = b.date.split('/');
  document.getElementById('f-date').value = parts[2] + '-' + parts[0].padStart(2,'0') + '-' + parts[1].padStart(2,'0');
  document.getElementById('f-bet').value = b.bet;
  document.getElementById('f-game').value = b.game === '—' ? '' : b.game;
  document.getElementById('f-odd').value = b.odd;
  document.getElementById('f-stake').value = b.stake;
  document.getElementById('f-outcome').value = b.outcome || '';
  document.getElementById('f-sport').value = b.sport || 'basketball';

  document.getElementById('outcome-group').style.display = '';

}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('outcome-group').style.display = 'none';
  editingId = null;
}
function handleOverlayClick(e) { if (e.target===e.currentTarget) closeModal(); }

async function saveBet() {
  const date = document.getElementById('f-date').value;
  const bet = document.getElementById('f-bet').value.trim();
  const game = document.getElementById('f-game').value.trim();
  const odd = parseFloat(document.getElementById('f-odd').value);
  const stake = parseFloat(document.getElementById('f-stake').value);
  const outcome = document.getElementById('f-outcome').value;
  const sport = document.getElementById('f-sport').value;
  if (!date || !bet || isNaN(odd) || isNaN(stake)) { alert('Please fill in Date, Bet, Odd and Stake.'); return; }
  const d = new Date(date);
  const formatted = (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear();
  const entry = { date:formatted, bet, game:game||'—', odd, stake, outcome, sport };
  const saveBtn = document.getElementById('saveBtn');
  saveBtn.textContent = 'Saving…';
  saveBtn.disabled = true;
  try {
    if (editingId !== null) {
      const existing = allBets.find(b => b.id === editingId);
      const isAccaLeg = existing && existing.acca_id;

      // For acca legs, preserve acca fields but allow outcome change
      const updateEntry = isAccaLeg
        ? { ...existing, bet, game: game||'—', odd, stake: existing.stake, sport, outcome }
        : { ...entry };

      await dbUpdate(editingId, updateEntry);
      const idx = allBets.findIndex(b => b.id === editingId);
      if (idx !== -1) allBets[idx] = { ...allBets[idx], ...updateEntry, id: editingId };

      // If acca leg, recalculate combined odd and sync outcome across all legs
      if (isAccaLeg) {
        const accaId = existing.acca_id;
        const legs = allBets.filter(b => b.acca_id === accaId);
        const newCombinedOdd = parseFloat(legs.reduce((p,l) => p * l.odd, 1).toFixed(4));

        for (const leg of legs) {
          const legIdx = allBets.findIndex(b => b.id === leg.id);
          if (legIdx !== -1) allBets[legIdx].acca_combined_odd = newCombinedOdd;
          await dbUpdate(leg.id, { ...allBets[legIdx], acca_combined_odd: newCombinedOdd });
        }
      }
    } else {
      const newRow = await dbInsert(entry);
      allBets.push({ ...entry, id: newRow.id });
      activeMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    }
    closeModal();
    // Show outcome field again for next time
    document.getElementById('f-outcome').closest('.form-group').style.display = '';
    render();
  } catch(e) {
    alert('Error saving: ' + e.message);
  } finally {
    saveBtn.textContent = 'Save Bet';
    saveBtn.disabled = false;
  }
}

// Apply saved theme
const savedTheme = localStorage.getItem('zebets_theme') || 'dark';

let touchStartY = 0, pulling = false, pullIndicator = null;
document.addEventListener('touchstart', e => {
  if (window.scrollY===0) { touchStartY=e.touches[0].clientY; pulling=true; }
}, {passive:true});
document.addEventListener('touchmove', e => {
  if (!pulling) return;
  const dist = e.touches[0].clientY - touchStartY;
  if (dist > 10 && window.scrollY===0) {
    if (!pullIndicator) {
      pullIndicator = document.createElement('div');
      pullIndicator.style.cssText = 'position:fixed;top:0;left:0;right:0;text-align:center;padding:10px;font-size:13px;color:var(--muted2);background:var(--surface2);z-index:999;';
      document.body.appendChild(pullIndicator);
    }
    pullIndicator.textContent = dist > 70 ? '↑ Release to refresh' : '↓ Pull to refresh';
    pullIndicator.style.opacity = Math.min(dist/70,1);
  }
}, {passive:true});
document.addEventListener('touchend', e => {
  if (!pulling) return;
  pulling = false;
  const dist = e.changedTouches[0].clientY - touchStartY;
  if (pullIndicator) { pullIndicator.remove(); pullIndicator=null; }
  if (dist > 70 && window.scrollY===0) refreshData();
}, {passive:true});

// ── ACCA LOGIC ─────────────────────────────────────────────────────────────

let accaLegCount = 0;
const collapsedAccas = new Set();

function openAccaModal() {
  accaLegCount = 0;
  document.getElementById('accaLegs').innerHTML = '';
  document.getElementById('a-date').value = new Date().toISOString().slice(0,10);
  document.getElementById('a-stake').value = '';
  document.getElementById('accaCombinedOdd').textContent = '—';
  document.getElementById('accaPotentialWin').textContent = '—';
  addAccaLeg(); addAccaLeg();
  document.getElementById('accaModalOverlay').classList.add('open');
}

function closeAccaModal() {
  document.getElementById('accaModalOverlay').classList.remove('open');
}

function handleAccaOverlayClick(e) {
  if (e.target === e.currentTarget) closeAccaModal();
}

function addAccaLeg() {
  accaLegCount++;
  const id = accaLegCount;
  const div = document.createElement('div');
  div.id = 'leg-' + id;
  div.style.cssText = 'display:grid;grid-template-columns:100px 1fr 1.2fr 65px 28px;gap:8px;align-items:center;';
  div.innerHTML =
    '<select id="leg-sport-'+id+'" style="padding:7px 6px;font-size:12px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;font-family:\'DM Sans\',sans-serif;width:100%;cursor:pointer;">' +
      '<option value="basketball">🏀 Basketball</option>' +
      '<option value="soccer">⚽ Soccer</option>' +
      '<option value="nfl">🏈 Football</option>' +
      '<option value="other">🎯 Other</option>' +
    '</select>' +
    '<input type="text" placeholder="Selection" id="leg-bet-'+id+'" oninput="updateAccaSummary()" style="padding:7px 10px;font-size:13px;">' +
    '<input type="text" placeholder="Game" id="leg-game-'+id+'" style="padding:7px 10px;font-size:13px;">' +
    '<input type="number" step="0.01" placeholder="Odd" id="leg-odd-'+id+'" oninput="updateAccaSummary()" style="padding:7px 10px;font-size:13px;">' +
    '<button onclick="removeLeg('+id+')" style="background:var(--red-bg);border:none;color:var(--red);border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">✕</button>';
  document.getElementById('accaLegs').appendChild(div);
  updateAccaSummary();
}

function removeLeg(id) {
  const el = document.getElementById('leg-' + id);
  if (el) el.remove();
  updateAccaSummary();
}

function updateAccaSummary() {
  const legs = document.querySelectorAll('#accaLegs > div[id^="leg-"]');
  let combined = 1;
  let allValid = true;
  legs.forEach(leg => {
    const id = leg.id.replace('leg-','');
    const odd = parseFloat(document.getElementById('leg-odd-'+id)?.value);
    if (!isNaN(odd) && odd > 0) combined *= odd;
    else allValid = false;
  });
  const roundedCombined = Math.round(combined * 100) / 100;
  const stake = parseFloat(document.getElementById('a-stake')?.value);
  document.getElementById('accaCombinedOdd').textContent = legs.length && allValid ? roundedCombined.toFixed(2) : '—';
  document.getElementById('accaPotentialWin').textContent = (legs.length && allValid && !isNaN(stake)) ? '€' + (stake * roundedCombined).toFixed(2) : '—';
}

async function saveAcca() {
  const date = document.getElementById('a-date').value;
  const stake = parseFloat(document.getElementById('a-stake').value);
  const outcome = '';

  if (!date || isNaN(stake)) { alert('Please fill in Date and Stake.'); return; }

  const legs = [];
  document.querySelectorAll('#accaLegs > div[id^="leg-"]').forEach(leg => {
    const id = leg.id.replace('leg-','');
    const bet = document.getElementById('leg-bet-'+id)?.value.trim();
    const game = document.getElementById('leg-game-'+id)?.value.trim();
    const odd = parseFloat(document.getElementById('leg-odd-'+id)?.value);
    const sport = document.getElementById('leg-sport-'+id)?.value || 'basketball';
    if (bet && !isNaN(odd)) legs.push({ bet, game: game||'—', odd, sport });
  });

  if (legs.length < 2) { alert('An accumulator needs at least 2 legs.'); return; }

  const btn = document.getElementById('accaSaveBtn');
  btn.textContent = 'Saving…'; btn.disabled = true;

  try {
    // Generate a unique acca_id
    const accaId = 'acca-' + Date.now() + '-' + Math.random().toString(36).slice(2,7);
    const d = new Date(date);
    const formatted = (d.getMonth()+1) + '/' + d.getDate() + '/' + d.getFullYear();
    const combinedOdd = Math.round(legs.reduce((p,l) => p * l.odd, 1) * 100) / 100;

    for (let i = 0; i < legs.length; i++) {
      const entry = {
        date: formatted,
        bet: legs[i].bet,
        game: legs[i].game,
        odd: legs[i].odd,
        stake: i === 0 ? stake : 0,
        outcome: outcome,
        sport: legs[i].sport || 'basketball',
        acca_id: accaId,
        acca_combined_odd: combinedOdd,
        acca_stake: stake,
        acca_leg: i + 1,
        acca_total_legs: legs.length
      };
      const row = await dbInsert(entry);
      allBets.push({ ...entry, id: row.id });
    }

    activeMonth = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    closeAccaModal();
    render();
  } catch(e) {
    alert('Error saving acca: ' + e.message);
  } finally {
    btn.textContent = 'Save Acca'; btn.disabled = false;
  }
}

function toggleAcca(accaId) {
  if (collapsedAccas.has(accaId)) collapsedAccas.delete(accaId);
  else collapsedAccas.add(accaId);
  renderTable(betsForMonth(activeMonth));
}

async function deleteAcca(accaId) {
  if (!confirm('Delete this entire accumulator and all its legs?')) return;
  try {
    const legs = allBets.filter(b => b.acca_id === accaId);
    for (const leg of legs) await dbDelete(leg.id);
    allBets = allBets.filter(b => b.acca_id !== accaId);
    render();
  } catch(e) { alert('Error: ' + e.message); }
}

async function setLegOutcome(legId, outcome) {
  try {
    const leg = allBets.find(b => b.id === legId);
    if (!leg) return;
    await dbUpdate(legId, { ...leg, outcome });
    const idx = allBets.findIndex(b => b.id === legId);
    if (idx !== -1) allBets[idx].outcome = outcome;
    render();
  } catch(e) { alert('Error: ' + e.message); }
}

function getAccaOutcome(accaId) {
  const legs = allBets.filter(b => b.acca_id === accaId);
  if (!legs.length) return '';
  if (legs.every(l => l.outcome === 'W')) return 'W';
  if (legs.some(l => l.outcome === 'L')) return 'L';
  return ''; // pending if any leg still pending
}

async function setAccaOutcome(accaId, outcome) {
  try {
    const legs = allBets.filter(b => b.acca_id === accaId);
    for (const leg of legs) {
      await dbUpdate(leg.id, { ...leg, outcome });
      const idx = allBets.findIndex(b => b.id === leg.id);
      if (idx !== -1) allBets[idx].outcome = outcome;
    }
    render();
  } catch(e) { alert('Error: ' + e.message); }
}
